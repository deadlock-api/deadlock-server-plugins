name: Build Gamemode Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  discover:
    name: Discover gamemodes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Parse gamemodes
        id: parse
        run: |
          matrix=$(jq -c '[keys[] as $k | {gamemode: $k, plugins: .[$k]}]' gamemodes.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Gamemodes: $matrix"

  build-base:
    name: Build native layer (shared cache)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout deadworks
        uses: actions/checkout@v6
        with:
          repository: raimannma/deadworks
          ref: main
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache native-builder
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: native-builder
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/cache:native
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/cache:native,mode=max

  build:
    name: Build ${{ matrix.entry.gamemode }}
    needs: [discover, build-base]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: plugins

      - name: Checkout deadworks
        uses: actions/checkout@v6
        with:
          repository: raimannma/deadworks
          ref: main
          path: deadworks
          submodules: recursive

      - name: Stage plugins for ${{ matrix.entry.gamemode }}
        run: |
          mkdir -p staged-plugins
          for plugin in $(echo '${{ toJson(matrix.entry.plugins) }}' | jq -r '.[]'); do
            rsync -a --exclude '*.Tests' "plugins/$plugin" "staged-plugins/"
          done
          echo "Staged plugins:"
          ls -la staged-plugins/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.entry.gamemode }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: deadworks
          file: deadworks/docker/Dockerfile
          build-contexts: |
            extra-plugins=staged-plugins
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:native
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.entry.gamemode }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.entry.gamemode }},mode=max
