name: Build Gamemode Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - 'knowledge-base/**'
      - '**.md'
      - 'docker-compose.yml'
      - '.env.example'
      - '.gitignore'
      - '.github/workflows/build-plugins.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'knowledge-base/**'
      - '**.md'
      - 'docker-compose.yml'
      - '.env.example'
      - '.gitignore'
      - '.github/workflows/build-plugins.yml'

jobs:
  discover:
    name: Discover gamemodes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name != 'workflow_dispatch' && github.ref_type != 'tag'
        with:
          filters: |
            force_all:
              - '.github/workflows/docker-gamemodes.yml'
              - 'gamemodes.json'
            Deathmatch:
              - 'Deathmatch/**'
            LockTimer:
              - 'LockTimer/**'
            StatusPoker:
              - 'StatusPoker/**'
            TrooperInvasion:
              - 'TrooperInvasion/**'
            HeroSelect:
              - 'HeroSelect/**'
            HealOnSpawn:
              - 'HealOnSpawn/**'
            DisconnectCleanup:
              - 'DisconnectCleanup/**'
            HeroSelectOnNextSpawn:
              - 'HeroSelectOnNextSpawn/**'

      - name: Compute gamemode matrix
        id: compute
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          FORCE_ALL: ${{ steps.filter.outputs.force_all }}
          CHANGES: ${{ steps.filter.outputs.changes }}
        run: |
          set -euo pipefail
          all_matrix=$(jq -c '[keys[] as $k | {gamemode: $k, plugins: .[$k]}]' gamemodes.json)

          if [[ "$EVENT_NAME" == "workflow_dispatch" || "$REF_TYPE" == "tag" || "$FORCE_ALL" == "true" ]]; then
            matrix="$all_matrix"
          else
            changed=$(echo "$CHANGES" | jq -c '[.[] | select(. != "force_all")]')
            matrix=$(jq -c --argjson changed "$changed" '
              [keys[] as $k
                | {gamemode: $k, plugins: .[$k]}
                | select(.plugins | any(. as $p | $changed | index($p)))]
            ' gamemodes.json)
          fi

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Building: $matrix"

  build-base:
    name: Build native layer (shared cache)
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout deadworks
        uses: actions/checkout@v6
        with:
          repository: raimannma/deadworks
          ref: main
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache native-builder
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          target: native-builder
          push: false
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/cache:native
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/cache:native,mode=max

  build:
    name: Build ${{ matrix.entry.gamemode }}
    needs: [discover, build-base]
    if: needs.discover.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        entry: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout plugins
        uses: actions/checkout@v6
        with:
          path: plugins

      - name: Checkout deadworks
        uses: actions/checkout@v6
        with:
          repository: raimannma/deadworks
          ref: main
          path: deadworks
          submodules: recursive

      - name: Stage plugins for ${{ matrix.entry.gamemode }}
        run: |
          mkdir -p staged-plugins
          for plugin in $(echo '${{ toJson(matrix.entry.plugins) }}' | jq -r '.[]'); do
            rsync -a --exclude '*.Tests' "plugins/$plugin" "staged-plugins/"
          done
          echo "Staged plugins:"
          ls -la staged-plugins/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.entry.gamemode }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ github.ref_name }}-${{ github.run_number }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=sha

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: deadworks
          file: deadworks/docker/Dockerfile
          build-contexts: |
            extra-plugins=staged-plugins
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:native
            type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.entry.gamemode }}
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/cache:${{ matrix.entry.gamemode }},mode=max
