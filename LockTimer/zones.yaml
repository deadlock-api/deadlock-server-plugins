# LockTimer zone definitions.
# Each entry maps a Deadlock map name to its start/end AABB zones
# expressed as world-unit min/max corners [x, y, z].
#
# Optional ordered `checkpoints` — runners must pass through them in list
# order before the end zone will register a finish. `name` is used for
# chat splits and metric labels; it defaults to cp{index} if omitted.
#
# Unknown maps have no zones and the timer stays idle.

maps:
  # dl_midtown is the default Deadlock map. Replace these placeholder
  # coordinates with the real start/end AABBs before using the plugin.
  dl_midtown:
    start:
      min: [0.0, 0.0, 0.0]
      max: [100.0, 100.0, 50.0]
    end:
      min: [500.0, 500.0, 0.0]
      max: [600.0, 600.0, 50.0]
    # checkpoints:
    #   - name: cp1
    #     min: [200.0, 200.0, 0.0]
    #     max: [250.0, 250.0, 50.0]
    #   - name: cp2
    #     min: [350.0, 350.0, 0.0]
    #     max: [400.0, 400.0, 50.0]
