x-base: &base
  env_file: .env
  volumes:
    - /etc/machine-id:/etc/machine-id:ro
    - proton:/opt/proton
    - gamedata:/home/steam/server
    - compatdata:/home/steam/.steam/steam/steamapps/compatdata
    - dotnet-cache:/opt/dotnet-cache
  restart: unless-stopped

services:
  normal:
    <<: *base
    image: ghcr.io/deadlock-api/deadlock-server-plugins/normal:latest
    ports:
      - "27015:27015/udp"
      - "27015:27015/tcp"
    environment:
      - SERVER_PORT=27015
      - DEADWORKS_ENV_PORT=27015

  lock-timer:
    <<: *base
    image: ghcr.io/deadlock-api/deadlock-server-plugins/lock-timer:latest
    ports:
      - "27016:27016/udp"
      - "27016:27016/tcp"
    environment:
      - SERVER_PORT=27016
      - DEADWORKS_ENV_PORT=27016

volumes:
  proton:
  gamedata:
  compatdata:
  dotnet-cache:
